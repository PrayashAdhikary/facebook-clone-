<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facebook - Sign Up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="logo logo-sm">facebook</div>

  <div class="card card-wide">
    <h1>Create a new account</h1>
    <p class="sub">It's quick and easy.</p>

    <form id="signupForm">

      <div class="name-row">
        <input type="text" id="fname" name="fname" placeholder="First name" required>
        <input type="text" id="lname" name="lname" placeholder="Surname" required>
      </div>

      <input type="email" id="email" name="email" placeholder="Mobile number or email address" required>
      <input type="password" id="password" name="password" placeholder="New password" required minlength="6">
      <input type="password" id="confirm" name="confirm" placeholder="Confirm password" required>

      <p class="field-label">Date of birth</p>
      <div class="dob-row">
        <select id="day" name="day"><option value="">Day</option></select>
        <select id="month" name="month">
          <option value="">Month</option>
          <option>Jan</option><option>Feb</option><option>Mar</option><option>Apr</option>
          <option>May</option><option>Jun</option><option>Jul</option><option>Aug</option>
          <option>Sep</option><option>Oct</option><option>Nov</option><option>Dec</option>
        </select>
        <select id="year" name="year"><option value="">Year</option></select>
      </div>

      <p class="field-label">Gender</p>
      <div class="gender-row">
        <label>Female <input type="radio" name="gender" value="female"></label>
        <label>Male   <input type="radio" name="gender" value="male"></label>
        <label>Custom <input type="radio" name="gender" value="custom"></label>
      </div>

      <p class="policy">
        By clicking Sign Up, you agree to our <a href="#">Terms</a>,
        <a href="#">Privacy Policy</a> and <a href="#">Cookies Policy</a>.
        You may receive SMS notifications from us and can opt out at any time.
      </p>

      <p id="errorMsg" style="color:#f02849; font-size:0.85rem; margin-bottom:10px; display:none;"></p>
      <p id="successMsg" style="color:#42b72a; font-size:0.85rem; margin-bottom:10px; display:none;"></p>

      <button class="btn-green" type="submit" id="signupBtn">Sign Up</button>

    </form>

    <div class="login-link">
      Already have an account? <a href="index.html">Log in</a>
    </div>
  </div>

  <script>
    // !! Replace this with your actual Render URL after deploying !!
    var BACKEND = 'https://YOUR-APP-NAME.onrender.com'

    // Fill Day dropdown
    var dayEl = document.getElementById('day')
    for (var d = 1; d <= 31; d++) {
      dayEl.innerHTML += '<option>' + d + '</option>'
    }

    // Fill Year dropdown
    var yearEl = document.getElementById('year')
    for (var y = new Date().getFullYear(); y >= 1924; y--) {
      yearEl.innerHTML += '<option>' + y + '</option>'
    }

    // Form submit
    var form       = document.getElementById('signupForm')
    var errorMsg   = document.getElementById('errorMsg')
    var successMsg = document.getElementById('successMsg')
    var signupBtn  = document.getElementById('signupBtn')

    form.addEventListener('submit', async function(e) {
      e.preventDefault()
      errorMsg.style.display   = 'none'
      successMsg.style.display = 'none'

      var password = document.getElementById('password').value
      var confirm  = document.getElementById('confirm').value

      if (password !== confirm) {
        errorMsg.textContent   = 'Passwords do not match'
        errorMsg.style.display = 'block'
        return
      }

      var gender = document.querySelector('input[name="gender"]:checked')
      var day    = document.getElementById('day').value
      var month  = document.getElementById('month').value
      var year   = document.getElementById('year').value

      signupBtn.textContent = 'Creating account...'
      signupBtn.disabled    = true

      try {
        var res = await fetch(BACKEND + '/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            firstName: document.getElementById('fname').value,
            lastName:  document.getElementById('lname').value,
            email:     document.getElementById('email').value,
            password:  password,
            dob:       day + ' ' + month + ' ' + year,
            gender:    gender ? gender.value : ''
          })
        })

        var data = await res.json()

        if (data.success) {
          successMsg.textContent   = 'Account created! Redirecting to login...'
          successMsg.style.display = 'block'
          setTimeout(function() {
            window.location.href = 'index.html'
          }, 1500)
        } else {
          errorMsg.textContent   = data.error
          errorMsg.style.display = 'block'
        }
      } catch (err) {
        errorMsg.textContent   = 'Could not connect to server. Try again.'
        errorMsg.style.display = 'block'
      }

      signupBtn.textContent = 'Sign Up'
      signupBtn.disabled    = false
    })
  </script>

</body>
</html>
