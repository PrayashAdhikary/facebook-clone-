<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trollbook - Log In</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="wrap">

    <div class="left">
      <div class="logo">trollbook</div>
      <p>Connect with friends and the world around you on Trollbook.</p>
    </div>

    <div class="card">
      <form id="loginForm">
        <input type="email" id="email" placeholder="Email address" required>
        <input type="password" id="password" placeholder="Password" required>
        <p id="msg" class="msg error"></p>
        <button class="btn-blue" type="submit" id="loginBtn">Log In</button>
      </form>
      <a class="forgot" href="#">Forgotten password?</a>
      <hr>
      <a class="btn-green" href="signup.html">Create new account</a>
    </div>

  </div>

  <footer>
    <div style="margin-bottom: 8px;">
      <a href="#">English (UK)</a> · <a href="#">हिन्दी</a> · <a href="#">অসমীয়া</a> ·
      <a href="#">Español</a> · <a href="#">Français</a> · <a href="#">Deutsch</a>
    </div>
    <div>
      <a href="#">Sign Up</a> · <a href="#">Log in</a> · <a href="#">Privacy</a> ·
      <a href="#">Terms</a> · <a href="#">Help Centre</a>
    </div>
    <div style="margin-top: 8px;">Trollbook © 2025</div>
  </footer>

  <script>
    // !! Replace with your Render URL after deploying !!
    var BACKEND = 'https://YOUR-APP-NAME.onrender.com'

    var form     = document.getElementById('loginForm')
    var msg      = document.getElementById('msg')
    var loginBtn = document.getElementById('loginBtn')

    form.addEventListener('submit', async function(e) {
      e.preventDefault()
      msg.style.display    = 'none'
      loginBtn.textContent = 'Logging in...'
      loginBtn.disabled    = true

      try {
        var res  = await fetch(BACKEND + '/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email:    document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        })

        var data = await res.json()

        if (data.success) {
          localStorage.setItem('loggedInUser', data.name)
          window.location.href = 'welcome.html'
        } else {
          msg.textContent   = data.error
          msg.style.display = 'block'
        }
      } catch (err) {
        msg.textContent   = 'Could not connect to server. Try again.'
        msg.style.display = 'block'
      }

      loginBtn.textContent = 'Log In'
      loginBtn.disabled    = false
    })
  </script>

</body>
</html>
